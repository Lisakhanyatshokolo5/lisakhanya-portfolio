<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisakhanya Tshokolo | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="hero-header page-header">
        <div class="wrapper">
            <header>
                <div class="logo">
                    <a href="index.html" style="display:flex;align-items:center;">
                        <div class="logo-text">LT</div>
                    </a>
                </div>
                <nav>
                    <div class="tooglebtn" id="tooglebtn">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <ul class="navlinks">
                        <li><a href="index.html" class="nav-link"><span class="tab-dot"></span>home</a></li>
                        <li><a href="about.html" class="nav-link"><span class="tab-dot"></span>about</a></li>
                        <li><a href="projects.html" class="nav-link"><span class="tab-dot"></span>projects</a></li>
                        <li><a href="experience.html" class="nav-link"><span class="tab-dot"></span>experience</a></li>
                        <li><a href="contact.html" class="nav-link active"><span class="tab-dot"></span>contact</a></li>
                    </ul>
                </nav>
            </header>
            <section id="contact" class="contact reveal page-section">

                <div class="section-title">
                    <h2>Get In Touch</h2>
                </div>

                <div class="contact-container">

                    <div class="contact-info reveal-left">
                        <div class="info-card">
                            <i class="fa-solid fa-envelope"></i>
                            <div>
                                <span class="label">Email</span>
                                <span class="value">220239215@mycput.ac.za</span>
                            </div>
                        </div>
                        <div class="info-card">
                            <i class="fa-brands fa-github"></i>
                            <div>
                                <span class="label">GitHub</span>
                                <span class="value">Lisakhanyatshokolo5</span>
                            </div>
                        </div>
                        <div class="info-card">
                            <i class="fa-solid fa-location-dot"></i>
                            <div>
                                <span class="label">Location</span>
                                <span class="value">Cape Town, South Africa</span>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-wrap reveal-right">
                        <div class="window-bar">
                            <span class="soft-tab-icon"><i class="fa-solid fa-heart"></i></span>
                            <span class="window-title">send_message.sh</span>
                        </div>
                        <form class="contact-form">
                            <label><span class="prompt">&#10022;</span> name</label>
                            <input type="text" placeholder="Enter your name" required>

                            <label><span class="prompt">&#10022;</span> email</label>
                            <input type="email" placeholder="Enter your email" required>

                            <label><span class="prompt">&#10022;</span> message</label>
                            <textarea rows="4" placeholder="Type your message..." required></textarea>

                            <button type="submit" class="btn active"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
                        </form>
                    </div>

                </div>

            </section>
            <footer class="site-footer">
                <p>&copy; 2026 Lisakhanya Tshokolo. Built with <span class="heart">&hearts;</span> and a lot of coffee.</p>
            </footer>

        </div>
    </div>

    <script src="Script.js"></script>
</body>

</html>
